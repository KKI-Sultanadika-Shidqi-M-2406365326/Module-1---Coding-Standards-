<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Payment List</title>
</head>
<body>

<h1>All Payments</h1>

<table border="1">
  <tr>
    <th>Payment ID</th>
    <th>Method</th>
    <th>Status</th>
  </tr>

  <tr th:each="payment : ${payments}">
    <td th:text="${payment.id}"></td>
    <td th:text="${payment.method}"></td>
    <td th:text="${payment.status}"></td>
  </tr>

</table>

</body>
</html>
